# Nginx config — Auctorum Systems (Quote Engine + MedConcierge)
# Wildcard subdomains: *.auctorum.com.mx + auctorum.com.mx

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=quotes:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=medconcierge_api:10m rate=30r/m;

# Upstreams
upstream auctorum_app {
    server 127.0.0.1:3000;
    keepalive 64;
}

upstream medconcierge_app {
    server 127.0.0.1:3001;
    keepalive 64;
}

# Redirect HTTP to HTTPS (all subdomains)
server {
    listen 80;
    server_name auctorum.com.mx www.auctorum.com.mx portal.auctorum.com.mx *.auctorum.com.mx;
    return 301 https://$host$request_uri;
}

# ==========================================================================
# Main HTTPS server — B2B Quote Engine + Landing
# Handles auctorum.com.mx and all tenant subdomains EXCEPT medconcierge ones
# ==========================================================================
server {
    listen 443 ssl http2;
    server_name auctorum.com.mx *.auctorum.com.mx;

    # SSL — Let's Encrypt wildcard via Cloudflare DNS
    ssl_certificate /etc/letsencrypt/live/auctorum.com.mx/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/auctorum.com.mx/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss image/svg+xml;

    # Static assets — long cache (Next.js immutable chunks)
    location /_next/static/ {
        proxy_pass http://auctorum_app;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Public assets
    location /favicon.ico {
        proxy_pass http://auctorum_app;
        proxy_cache_valid 200 7d;
    }

    # Health check — no rate limiting
    location = /api/health {
        proxy_pass http://auctorum_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API rate limiting — quotes (stricter)
    location /api/quotes {
        limit_req zone=quotes burst=5 nodelay;
        proxy_pass http://auctorum_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API rate limiting — general
    location /api/ {
        limit_req zone=api burst=10 nodelay;
        proxy_pass http://auctorum_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # All other requests
    location / {
        proxy_pass http://auctorum_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Block dotfiles
    location ~ /\. {
        deny all;
        return 404;
    }

    # Max upload (for product images)
    client_max_body_size 10M;
}

# ==========================================================================
# MedConcierge HTTPS server
# Handles dra-*, dr-*, doc-* subdomains (medical appointment booking)
# ==========================================================================
server {
    listen 443 ssl http2;
    server_name dra-*.auctorum.com.mx dr-*.auctorum.com.mx doc-*.auctorum.com.mx;

    # SSL — same wildcard cert
    ssl_certificate /etc/letsencrypt/live/auctorum.com.mx/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/auctorum.com.mx/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss image/svg+xml;

    # Static assets — long cache (Next.js immutable chunks)
    location /_next/static/ {
        proxy_pass http://medconcierge_app;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Public assets
    location /favicon.ico {
        proxy_pass http://medconcierge_app;
        proxy_cache_valid 200 7d;
    }

    # Health check — no rate limiting
    location = /api/health {
        proxy_pass http://medconcierge_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API rate limiting
    location /api/ {
        limit_req zone=medconcierge_api burst=10 nodelay;
        proxy_pass http://medconcierge_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # All other requests
    location / {
        proxy_pass http://medconcierge_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Block dotfiles
    location ~ /\. {
        deny all;
        return 404;
    }

    client_max_body_size 5M;
}
